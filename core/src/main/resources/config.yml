
lang: en-us

authentication:
  yggdrasil:
    # If true, the plugin will verify the player's IP address when authenticating with Yggdrasil.
    # Make sure that either there are no proxy before velocity or HAProxy is on.
    verify-ip: false

    # Enabled session servers for Yggdrasil authentication.
    auth-servers:
      mojang: "https://sessionserver.mojang.com/"
      littleskin: "https://littleskin.cn/api/yggdrasil/sessionserver/"

    whitelist:
      # Specify which auth methods require the in-memory whitelist for new players.
      # Players who have previously logged in (have an existing database record) are always allowed.
      # New players without a record must be added to the whitelist via:
      #   /multiauth whitelist add <auth_method> <player>
      enabled-for:
        - littleskin

  # Database connection settings for storing UUID and authentication method data.
  mysql:
    host: "localhost"
    port: 3306
    database: "multiauth"
    username: "root"
    password: ""
    # Typical recommended value:
    # "useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
    parameters: "useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"

prefix: # Used for placeholder/TAB integration. Use %multiauth-auth-tag% in TAB to display.
  mojang: "<green>Online"
  littleskin: "<yellow>Littleskin"

log:
  pre-login: false
  auth-yggdrasil: true

regex:
  username-regex: ".*" # Suggested regex: "[a-zA-Z0-9_]{3,20}"
