auth:
  invalid-session: "Invalid session! Please log in again."
  invalid-username: "Invalid username! Please avoid using weird characters."
  unknown-error: "Unknown error! Please contact an administrator and try again."
  whitelist-denied: "You are not whitelisted on this server!"

  failed-to-login: "Login verification system error, please contact an administrator!"

tab-complete:
  force-change-password:
    player: "<player>"
  profile:
    name: "<name>"
    id: "<profile-id>"
    auth-method: "<auth-method>"
    login-uuid: "<login-uuid>"
  whitelist:
    player: "<player>"

command:
  default: "Unknown subcommand!"
  no-permission: "You do not have permission to execute this command!"

  player-not-exists: "The player %player% does not exist!"

  reload:
    success: "Successfully reloaded AuthX!"

  profile:
    invalid-format: "Incorrect format! Use /multiauth profile <create|set|rename|info>"
    not-found: "Profile #%id% does not exist!"
    create:
      invalid-format: "Incorrect format! Use /multiauth profile create <name>"
      success: "Created profile #%id%, name: %name%, UUID: %uuid%"
      failed: "Failed to create profile: %error%"
    set:
      invalid-format: "Incorrect format! Use /multiauth profile set <auth_method> <login_uuid> <profile_id>"
      invalid-uuid: "Invalid UUID format!"
      invalid-id: "Invalid profile ID!"
      success: "Login %auth_method%/%login_uuid% is now mapped to profile #%id%"
    rename:
      invalid-format: "Incorrect format! Use /multiauth profile rename <profile_id> <new_name>"
      invalid-id: "Invalid profile ID!"
      success: "Profile #%id% has been renamed to %name%"
    info:
      invalid-format: "Incorrect format! Use /multiauth profile info <profile_id>"
      invalid-id: "Invalid profile ID!"
      result: "Profile #%id% | Name: %name% | UUID: %uuid%"

  whitelist:
    invalid-format: "Incorrect format! Use /multiauth whitelist <add|remove|list>"
    add:
      invalid-format: "Incorrect format! Use /multiauth whitelist add <auth_method> <player>"
      success: "Player %player% has been added to the whitelist for %auth_method%"
    remove:
      invalid-format: "Incorrect format! Use /multiauth whitelist remove <auth_method> <player>"
      success: "Player %player% has been removed from the whitelist for %auth_method%"
      not-found: "Player %player% is not on the whitelist for %auth_method%"
    list:
      invalid-format: "Incorrect format! Use /multiauth whitelist list <auth_method>"
      header: "Whitelist for %auth_method% (%count% players):"
      empty: "The whitelist for %auth_method% is empty."

  migrate:
    invalid-format: "Incorrect format! Use /multiauth migrate"
    started: "Started migrating data from table multilogin_user_data_v3..."
    finished: "Migration finished: total %total% | migrated %migrated% | skipped %skipped% | failed %failed%"
    failed: "Migration failed: error: %error%"
