auth:
  invalid-session: "无效的会话! 请重新登录"
  invalid-username: "用户名不符合规范! 请使用英文字符与数字组合作为用户名!"
  unknown-error: "未知错误! 请联系管理员并重试"
  whitelist-denied: "你不在该服务器的白名单中!"

  failed-to-login: "登录验证系统出错，请联系管理员!"

tab-complete:
  force-change-password:
    player: "<玩家>"
  profile:
    name: "<名称>"
    id: "<档案ID>"
    auth-method: "<登录方式>"
    login-uuid: "<登录UUID>"
  whitelist:
    player: "<玩家>"

command:
  default: "未知的子命令!"
  no-permission: "你没有权限执行该命令!"

  player-not-exists: "玩家 %player% 不存在!"

  reload:
    success: "成功重载了 MultiAuth !"

  profile:
    invalid-format: "错误的格式! 请使用 /multiauth profile <create|set|rename|info>"
    not-found: "档案 #%id% 不存在!"
    create:
      invalid-format: "错误的格式! 请使用 /multiauth profile create <名称>"
      success: "已创建档案 #%id%，名称: %name%，UUID: %uuid%"
      failed: "创建档案失败: %error%"
    set:
      invalid-format: "错误的格式! 请使用 /multiauth profile set <登录方式> <登录UUID> <档案ID>"
      invalid-uuid: "无效的 UUID 格式!"
      invalid-id: "无效的档案 ID!"
      success: "已将登录 %auth_method%/%login_uuid% 的档案设置为 #%id%"
    rename:
      invalid-format: "错误的格式! 请使用 /multiauth profile rename <档案ID> <新名称>"
      invalid-id: "无效的档案 ID!"
      success: "已将档案 #%id% 的名称修改为 %name%"
    info:
      invalid-format: "错误的格式! 请使用 /multiauth profile info <档案ID>"
      invalid-id: "无效的档案 ID!"
      result: "档案 #%id% | 名称: %name% | UUID: %uuid%"

  whitelist:
    invalid-format: "错误的格式! 请使用 /multiauth whitelist <add|remove|list>"
    add:
      invalid-format: "错误的格式! 请使用 /multiauth whitelist add <登录方式> <玩家>"
      success: "已将玩家 %player% 添加到 %auth_method% 的白名单"
    remove:
      invalid-format: "错误的格式! 请使用 /multiauth whitelist remove <登录方式> <玩家>"
      success: "已将玩家 %player% 从 %auth_method% 的白名单中移除"
      not-found: "玩家 %player% 不在 %auth_method% 的白名单中"
    list:
      invalid-format: "错误的格式! 请使用 /multiauth whitelist list <登录方式>"
      header: "%auth_method% 的白名单 (共 %count% 名玩家):"
      empty: "%auth_method% 的白名单为空"

  migrate:
    invalid-format: "错误的格式! 请使用 /multiauth migrate"
    started: "开始从旧表 multilogin_user_data_v3 迁移数据..."
    finished: "迁移完成: 总数 %total% | 成功 %migrated% | 跳过 %skipped% | 失败 %failed%"
    failed: "迁移失败: 错误: %error%"

  query:
    invalid-format: "错误的格式! 请使用 /multiauth query <玩家>"
    not-found: "找不到玩家 %player% 的档案!"
    result: "玩家 %player% | 档案 #%id% | UUID: %uuid% | 登录方式: %auth_method%"

  list:
    header: "在线玩家 (共 %count% 人):"
    entry: "%player% | UUID: %uuid% | 登录方式: %auth_method%"
    empty: "当前没有在线玩家"
